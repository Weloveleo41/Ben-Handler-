<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Info Ventures - The information edge. Discover, build, and scale business opportunities in the information economy.">
    <title>Info Ventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Screen -->
    <main class="screen">
        <!-- Subtle grid bg -->
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <!-- Small top logo -->
        <div class="top-bar">
            <div class="logo">
                <div class="logo-mark">IV</div>
                <span class="logo-text">Info Ventures</span>
            </div>
        </div>

        <!-- Center content -->
        <div class="center">
            <!-- Icon -->
            <div class="icon-wrapper">
                <svg class="icon-main" viewBox="0 0 80 80" fill="none">
                    <!-- Lightbulb / information symbol -->
                    <circle cx="40" cy="40" r="38" stroke="url(#grad)" stroke-width="2" opacity="0.3"/>
                    <circle cx="40" cy="40" r="28" stroke="url(#grad)" stroke-width="1.5" opacity="0.15"/>
                    <path d="M40 18C30.06 18 22 26.06 22 36c0 6.63 3.58 12.43 8.92 15.58V56a3 3 0 003 3h12.16a3 3 0 003-3v-4.42C55.42 48.43 59 42.63 59 36c0-9.94-8.06-18-19-18z" fill="url(#grad)" opacity="0.15"/>
                    <path d="M40 18C30.06 18 22 26.06 22 36c0 6.63 3.58 12.43 8.92 15.58V56a3 3 0 003 3h12.16a3 3 0 003-3v-4.42C55.42 48.43 59 42.63 59 36c0-9.94-8.06-18-19-18z" stroke="url(#grad)" stroke-width="2"/>
                    <line x1="33" y1="62" x2="47" y2="62" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="66" x2="45" y2="66" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
                    <line x1="40" y1="30" x2="40" y2="44" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="40" cy="26" r="2" fill="url(#grad)"/>
                    <defs>
                        <linearGradient id="grad" x1="22" y1="18" x2="59" y2="66" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#10b892"/>
                            <stop offset="1" stop-color="#0ea5e9"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <!-- Headline -->
            <h1 class="headline">The Information Edge.</h1>
            <p class="tagline">Discover. Build. Scale.</p>
            <p class="description">Business opportunities in the information economy.</p>

            <!-- CTA -->
            <div class="actions">
                <a href="mailto:hello@infoventures.com.au" class="btn-main">Get in Touch</a>
            </div>

            <!-- Three pillars -->
            <div class="pillars">
                <div class="pillar">
                    <span class="pillar-label">Discover</span>
                    <span class="pillar-desc">Biz op intelligence</span>
                </div>
                <div class="pillar-divider"></div>
                <div class="pillar">
                    <span class="pillar-label">Build</span>
                    <span class="pillar-desc">Venture creation</span>
                </div>
                <div class="pillar-divider"></div>
                <div class="pillar">
                    <span class="pillar-label">Scale</span>
                    <span class="pillar-desc">Growth systems</span>
                </div>
            </div>
        </div>

        <!-- Bottom -->
        <div class="bottom-bar">
            <span class="bottom-text">&copy; 2025 Info Ventures. Sydney, Australia.</span>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
